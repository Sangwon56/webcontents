<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>설문지</title>
    </head>
    <body>
        <form>
            <fieldset>
                <h3>설문지</h3>
                <br>
                <p>소프트웨어 기술에 대한 의견을 듣습니다. 많은 참여 부탁드립니다.</p>
                <hr>
                학년
                <label><input type="radio" name="grade" value="1">1학년</label>
                <label><input type="radio" name="grade" value="2">2학년</label>
                <label><input type="radio" name="grade" value="3">3학년</label>
                <br>
                성별
                <label><input type="radio" name="gender" value="1">남</label>
                <label><input type="radio" name="gender" value="2">여</label>
                <br>
                관심분야
                <select name="interested" size="1">
                    <option value="1" selected>모바일 소프트웨어</option>
                    <option value="2">자바 스크립트</option>
                    <option value="3">C 언어</option>
                </select>
                <br>
                진로
                <label>개발<input type="checkbox" value="1" checked></label>
                <label>기획<input type="checkbox" value="2"></label>
                <label>영업<input type="checkbox" value="3"></label>
                <label>창업<input type="checkbox" value="4"></label>
                <br>
                남기고싶은말
                <textarea cols="40" rows="5">
                    글을 남겨주세요
                </textarea>
                <br>
                <p>
                    Copyright 2026 by MYONGJI COLLEGE
                </p>
            </fieldset>
        </form>
    </body>
</html>
